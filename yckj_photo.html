<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>英才考级 · 双面证书系统 | 正面+反面定制 | 坐标自由调节</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: #eef2f5;
            padding: 24px;
        }

        .container {
            max-width: 1650px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 24px 28px 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
            border-bottom: 2px solid #f0ede5;
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 34px;
            background: linear-gradient(135deg, #bb8c2f, #e6bc6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .main-content {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .form-panel {
            flex: 1.2;
            min-width: 400px;
            background: #fefcf8;
            border-radius: 28px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            padding: 22px;
            border: 1px solid #ece5d8;
            height: fit-content;
            max-height: 88vh;
            overflow-y: auto;
        }

        .preview-panel {
            flex: 2.5;
            background: #faf9f5;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 2px solid #e7dfd1;
            margin-bottom: 22px;
            padding-bottom: 6px;
            flex-wrap: wrap;
        }

        .tab {
            font-size: 15px;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            background: #f0ede7;
            color: #5e5540;
        }

        .tab.active {
            background: #dbb452;
            color: white;
            box-shadow: 0 3px 8px rgba(187,140,47,0.2);
        }

        .side-switch {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .side-btn {
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: bold;
            background: #e9e1d2;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }

        .side-btn.active-side {
            background: #dbb452;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #4a3e2c;
            margin-bottom: 6px;
            font-size: 13.5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 9px 14px;
            border: 1px solid #ddd3c4;
            border-radius: 18px;
            font-size: 14px;
            background: white;
        }

        .photo-upload-row, .bg-upload-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .photo-preview, .bg-preview {
            width: 75px;
            height: 90px;
            border: 2px solid #dbb452;
            border-radius: 12px;
            overflow: hidden;
            background: #f4f0e8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-preview {
            width: 90px;
            height: 70px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13.5px;
        }

        .btn-primary { background: #dbb452; color: white; }
        .btn-primary:hover { background: #c29f3f; transform: translateY(-1px);}
        .btn-success { background: #2f8b5a; color: white; }
        .btn-outline { background: white; border: 1px solid #dbb452; color: #b6841a; }
        .btn-warning { background: #a5692c; color: white; }

        .canvas-container {
            background: #e9e2d4;
            border-radius: 24px;
            padding: 8px;
            overflow: auto;
            max-width: 100%;
            text-align: center;
        }

        #certificateCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        .coordinate-config {
            background: #fef8ef;
            border-radius: 22px;
            padding: 18px;
            margin-top: 12px;
        }

        .coord-section {
            margin-bottom: 24px;
            border-bottom: 1px dashed #e0cfb0;
            padding-bottom: 12px;
        }

        .coord-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .coord-item {
            background: white;
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .coord-item label { width: 70px; font-size: 12px; font-weight: 600; }
        .coord-item input { width: 80px; padding: 5px; border-radius: 20px; border: 1px solid #ccc; text-align: center; }

        .api-response {
            margin-top: 18px;
            background: #eae4d6;
            padding: 10px;
            border-radius: 18px;
            font-size: 11px;
            max-height: 160px;
            overflow: auto;
        }
        .badge { background: #f3e5c0; border-radius: 30px; padding: 2px 10px; font-size: 12px; }
        hr { margin: 8px 0; }
        .subtitle { font-size: 13px; color: #a5762c; margin-top: 4px; }
    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <h1>🏵️ 英才考级 · 双面艺术证书系统</h1>
            <p style="color: #7e6a48;">正面+反面独立编辑 | 背景上传 | 双语+评定项 | 宋体46px</p>
        </div>

        <div class="main-content">
            <!-- 左侧配置区 -->
            <div class="form-panel">
                <div class="tabs">
                    <div class="tab" :class="{ active: activeTab === 'basic' }" @click="activeTab = 'basic'">📋 信息录入 (正/反)</div>
                    <div class="tab" :class="{ active: activeTab === 'coords' }" @click="activeTab = 'coords'">📍 坐标调校 (双面)</div>
                </div>

                <!-- 基本信息面板 包含正面反面内容 -->
                <div v-show="activeTab === 'basic'">
                    <!-- 背景与模式 -->
                    <div class="form-group">
                        <label>🖼️ 双面共用背景 (上传即替换底色)</label>
                        <div class="bg-upload-row">
                            <input type="file" @change="handleBackgroundUpload" accept="image/jpeg,image/png,image/webp">
                            <div class="bg-preview"><img v-if="backgroundPreview" :src="backgroundPreview" alt="背景预览"><span v-else style="font-size:10px;">无</span></div>
                            <button class="btn btn-outline" @click="clearBackground" style="padding:5px 12px;">🗑️ 清除</button>
                        </div>
                        <div class="subtitle">* 无双面共用背景时，使用白色/透明底</div>
                    </div>
                    <!-- 正面/反面快速切换显示 -->
                    <div style="display: flex; gap: 20px; margin-bottom: 16px; align-items: center;">
                        <strong style="color:#936e2c;">当前编辑区:</strong>
                        <div class="side-switch" style="margin-bottom:0;">
                            <button class="side-btn" :class="{ 'active-side': editSide === 'front' }" @click="editSide='front'">📄 正面信息编辑</button>
                            <button class="side-btn" :class="{ 'active-side': editSide === 'back' }" @click="editSide='back'">🔄 反面信息编辑</button>
                        </div>
                    </div>

                    <!-- ================= 正面表单 ================= -->
                    <div v-show="editSide === 'front'">
                        <div class="form-group"><label>📸 学员照片 (正面)</label><div class="photo-upload-row"><input type="file" @change="handlePhotoUpload" accept="image/*"><div class="photo-preview"><img v-if="form.photo" :src="form.photo" alt="照片"><span v-else>无</span></div></div></div>
                        <div class="form-group"><label>👤 中文姓名</label><input v-model="form.name"></div>
                        <div class="form-group"><label>🌐 姓名拼音</label><input v-model="form.namePy"></div>
                        <div class="form-group"><label>⚥ 性别</label><select v-model="form.sex"><option>男</option><option>女</option></select></div>
                        <div class="form-group"><label>🏷️ 性别(英文)</label><select v-model="form.sexPy"><option>MALE</option><option>FEMALE</option></select></div>
                        <div class="form-group"><label>🌍 国籍</label><input v-model="form.nationality"></div>
                        <div class="form-group"><label>🌏 国籍(英文)</label><input v-model="form.nationalityPy"></div>
                        <div class="form-group"><label>🥻 民族</label><input v-model="form.nation"></div>
                        <div class="form-group"><label>🏮 民族(英文)</label><input v-model="form.nationPy"></div>
                        <div class="form-group"><label>🎂 出生日期</label><input v-model="form.birthday"></div>
                        <div class="form-group"><label>📅 出生日期(英文)</label><input v-model="form.birthdayPy"></div>
                        <div class="form-group"><label>📆 发证时间</label><input v-model="form.certificateTime"></div>
                        <div class="form-group"><label>🗓️ 发证时间(英文)</label><input v-model="form.certificateTimePy"></div>
                        <div class="form-group"><label>📊 起止级</label><input v-model="form.maxLevel"></div>
                        <div class="form-group"><label>📈 起止级(英文)</label><input v-model="form.maxLevelPy"></div>
                        <div class="form-group"><label>🎵 专业科目</label><input v-model="form.subjectName"></div>
                        <div class="form-group"><label>🎼 专业(英文)</label><input v-model="form.subjectNamePy"></div>
                        <div class="form-group"><label>🏅 等级</label><input v-model="form.level"></div>
                        <div class="form-group"><label>🎖️ 等级(英文)</label><input v-model="form.levelPy"></div>
                        <div class="form-group"><label>⭐ 成绩</label><select v-model="form.result"><option>优秀</option><option>良好</option><option>合格</option></select></div>
                        <div class="form-group"><label>✨ 成绩(英文)</label><select v-model="form.resultPy"><option>Excellent</option><option>Good</option><option>Pass</option></select></div>
                        <div class="form-group"><label>🔖 证书编号</label><input v-model="form.certificate"></div>
                        <div class="form-group"><label>🏷️ 证书编号(英文)</label><input v-model="form.certificatePy"></div>
                        <div class="form-group"><label>📐 照片尺寸(宽/高)</label><div style="display:flex; gap:12px;"><input type="number" v-model.number="form.photoWidth"><input type="number" v-model.number="form.photoHeight"></div></div>
                    </div>

                    <!-- ================= 反面表单 (基于提供JSON) ================= -->
                    <div v-show="editSide === 'back'">
                        <div class="form-group"><label>📛 背面姓名</label><input v-model="backForm.backName" placeholder="证书背面姓名"></div>
                        <div class="form-group"><label>🎯 背面专业</label><input v-model="backForm.backSubjectName" placeholder="音乐/舞蹈/戏曲"></div>
                        <div class="form-group"><label>🔢 背面证书编号</label><input v-model="backForm.backCertificate" placeholder="编号"></div>
                        <div class="form-group"><label>🎵 评分项1 (节奏，表达力，音准)</label><input v-model="backForm.result1" placeholder="节奏准确，表达力强"></div>
                        <div class="form-group"><label>💪 评分项2 (基本功，应变力，节奏)</label><input v-model="backForm.result2" placeholder="基本功扎实，应变出色"></div>
                        <div class="form-group"><label>✨ 评分项3 (表现力，记忆力)</label><input v-model="backForm.result3" placeholder="表现力优秀，记忆力强"></div>
                        <div class="form-group"><label>🏆 评分项4 (完整性)</label><input v-model="backForm.result4" placeholder="作品完整流畅"></div>
                        <div class="form-group"><label>📝 总体评价</label><textarea rows="2" v-model="backForm.backResult" placeholder="总体评价：演奏技巧娴熟，艺术感染力强"></textarea></div>
                    </div>
                </div>

                <!-- 坐标配置面板 (支持正面 & 反面) -->
                <div v-show="activeTab === 'coords'" class="coordinate-config">
                    <div class="coord-section">
                        <h4>🎯 正面坐标配置 <span class="badge">中英文双语</span></h4>
                        <div class="coord-grid">
                            <div class="coord-item" v-for="cfg in frontCoords" :key="cfg.key">
                                <label>{{ cfg.label }} :</label><span>X</span><input type="number" v-model.number="cfg.x"><span>Y</span><input type="number" v-model.number="cfg.y">
                            </div>
                            <div class="coord-item"><label>📷 照片坐标</label><span>X</span><input type="number" v-model.number="form.photoX"><span>Y</span><input type="number" v-model.number="form.photoY"></div>
                        </div>
                    </div>
                    <div class="coord-section">
                        <h4>🔄 反面坐标配置 (评定表)</h4>
                        <div class="coord-grid">
                            <div class="coord-item" v-for="cfg in backCoords" :key="cfg.key">
                                <label>{{ cfg.label }} :</label><span>X</span><input type="number" v-model.number="cfg.x"><span>Y</span><input type="number" v-model.number="cfg.y">
                            </div>
                        </div>
                    </div>
                    <div class="btn-group" style="margin-top:12px;">
                        <button class="btn btn-primary" @click="resetDefaultCoords">⟳ 重置所有默认坐标</button>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" @click="refreshPreview">✨ 刷新预览 (当前面)</button>
                    <button class="btn btn-success" @click="downloadCurrentSide">⬇️ 下载当前面 (PNG)</button>
                    <button class="btn btn-outline" @click="downloadSide('front')">📸 单独下载正面</button>
                    <button class="btn btn-outline" @click="downloadSide('back')">📄 单独下载反面</button>
                </div>
            </div>

            <!-- 右侧预览面板  + 切换正反面按钮 -->
            <div class="preview-panel">
                <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin:0;">🎨 证书实时预览</h3>
                    <div class="side-switch" style="margin-bottom:0;">
                        <button class="side-btn" :class="{ 'active-side': previewSide === 'front' }" @click="previewSide='front'; refreshPreview()">📇 正面预览</button>
                        <button class="side-btn" :class="{ 'active-side': previewSide === 'back' }" @click="previewSide='back'; refreshPreview()">📄 反面预览</button>
                    </div>
                </div>
                <div class="canvas-container">
                    <canvas id="certificateCanvas" width="2411" height="3356" style="width:100%; height:auto; border-radius: 16px;"></canvas>
                </div>
                <div v-if="apiResponse" class="api-response"><strong>📡 后端反馈</strong><pre>{{ JSON.stringify(apiResponse, null, 2) }}</pre></div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, reactive, onMounted, watch, nextTick } = Vue;

    createApp({
        setup() {
            const activeTab = ref('basic');
            const editSide = ref('front');       // 切换编辑区域 正面/反面
            const previewSide = ref('front');     // 预览正面/反面
            const apiResponse = ref(null);
            let canvas = null, ctx = null;
            let bgImageObj = null;
            const backgroundPreview = ref('');
            const hasCustomBg = ref(false);

            // 正面数据 (默认完全保留)
            const form = reactive({
                photo: '',
                templateType: 'standard',
                name: '欧阳若曦', namePy: 'OUYANG RUOXI',
                sex: '女', sexPy: 'FEMALE',
                nationality: '中国', nationalityPy: 'China',
                nation: '汉族', nationPy: 'Han',
                birthday: '2010年05月', birthdayPy: 'May 2010',
                certificateTime: '2026年04月20日', certificateTimePy: 'April 20, 2026',
                maxLevel: '1级 - 10级', maxLevelPy: 'Level 1 - Level 10',
                subjectName: '钢琴', subjectNamePy: 'Piano',
                level: '十级', levelPy: 'Grade 10',
                result: '优秀', resultPy: 'Excellent',
                certificate: 'YCE2026A88888', certificatePy: 'YCE2026A88888',
                photoWidth: 280, photoHeight: 360,
                photoX: 580, photoY: 1220
            });

            // 反面数据 (基于JSON的字段)
            const backForm = reactive({
                backName: '欧阳若曦',
                backSubjectName: '钢琴',
                backCertificate: 'BK2026P001',
                result1: '优秀',
                result2: '优秀',
                result3: '优秀',
                result4: '优秀',
                backResult: '优秀'
            });

            // 正面坐标配置 (保留原列表)
            const frontCoords = reactive([
                { key: 'name', label: '姓名', x: 1370, y: 1250, type: 'cn', field: 'name' },
                { key: 'namePy', label: '姓名(英文)', x: 1370, y: 1337, type: 'en', field: 'namePy' },
                { key: 'sex', label: '性别', x: 1370, y: 1424, type: 'cn', field: 'sex' },
                { key: 'sexPy', label: '性别(英文)', x: 1370, y: 1511, type: 'en', field: 'sexPy' },
                { key: 'nationality', label: '国籍', x: 1370, y: 1590, type: 'cn', field: 'nationality' },
                { key: 'nationalityPy', label: '国籍(英文)', x: 1370, y: 1685, type: 'en', field: 'nationalityPy' },
                { key: 'nation', label: '民族', x: 1370, y: 1772, type: 'cn', field: 'nation' },
                { key: 'nationPy', label: '民族(英文)', x: 1370, y: 1859, type: 'en', field: 'nationPy' },
                { key: 'birthday', label: '出生日期', x: 1370, y: 1946, type: 'cn', field: 'birthday' },
                { key: 'birthdayPy', label: '出生日期(英文)', x: 1370, y: 2033, type: 'en', field: 'birthdayPy' },
                { key: 'certificateTime', label: '发证时间', x: 1370, y: 2120, type: 'cn', field: 'certificateTime' },
                { key: 'certificateTimePy', label: '发证时间(英文)', x: 1370, y: 2207, type: 'en', field: 'certificateTimePy' },
                { key: 'maxLevel', label: '起止级', x: 1370, y: 2295, type: 'cn', field: 'maxLevel' },
                { key: 'maxLevelPy', label: '起止级(英文)', x: 1370, y: 2385, type: 'en', field: 'maxLevelPy' },
                { key: 'subjectName', label: '专业', x: 490, y: 1830, type: 'cn', field: 'subjectName' },
                { key: 'subjectNamePy', label: '专业(英文)', x: 490, y: 1915, type: 'en', field: 'subjectNamePy' },
                { key: 'level', label: '等级', x: 490, y: 2000, type: 'cn', field: 'level' },
                { key: 'levelPy', label: '等级(英文)', x: 490, y: 2088, type: 'en', field: 'levelPy' },
                { key: 'result', label: '成绩', x: 490, y: 2180, type: 'cn', field: 'result' },
                { key: 'resultPy', label: '成绩(英文)', x: 490, y: 2265, type: 'en', field: 'resultPy' },
                { key: 'certificate', label: '证书编号', x: 490, y: 2350, type: 'cn', field: 'certificate' },
                { key: 'certificatePy', label: '证书编号(英文)', x: 490, y: 2435, type: 'en', field: 'certificatePy' }
            ]);

            // 反面坐标配置 (基于JSON提供默认坐标)
            const backCoords = reactive([
                { key: 'backName', label: ' ', x: 720, y: 1400, field: 'backName' },
                { key: 'backSubjectName', label: '', x: 720, y: 1560, field: 'backSubjectName' },
                { key: 'backCertificate', label: ' ', x: 720, y: 1720, field: 'backCertificate' },
                { key: 'result1', label: ' ', x: 720, y: 1860, field: 'result1' },
                { key: 'result2', label: ' ', x: 720, y: 2020, field: 'result2' },
                { key: 'result3', label: ' ', x: 720, y: 2180, field: 'result3' },
                { key: 'result4', label: ' ', x: 720, y: 2345, field: 'result4' },
                { key: 'backResult', label: ' ', x: 720, y: 2510, field: 'backResult' }
            ]);

            // 辅助: 获取正面显示文本
            const getFrontDisplay = (cfg) => {
                let value = form[cfg.field];
                if (value === undefined) value = '';
                const cnPrefix = { name:'姓名', sex:'性别', nationality:'国籍', nation:'民族', birthday:'出生日期', certificateTime:'发证时间', maxLevel:'起止级', subjectName:'专业', level:'等级', result:'成绩', certificate:'证书编号' };
                const enPrefix = { namePy:'Name', sexPy:'Gender', nationalityPy:'Nationality', nationPy:'Ethnicity', birthdayPy:'Date of Birth', certificateTimePy:'Issue Date', maxLevelPy:'Grade Range', subjectNamePy:'Subject', levelPy:'Level', resultPy:'Result', certificatePy:'Certificate No.' };
                if (cfg.type === 'cn') return `${cnPrefix[cfg.key] || cfg.label}: ${value}`;
                if (cfg.key === 'sexPy') return `Gender: ${form.sexPy === 'MALE' ? 'Male' : 'Female'}`;
                if (cfg.key === 'resultPy') return `Result: ${form.resultPy}`;
                const prefix = enPrefix[cfg.key] || cfg.label;
                return `${prefix}: ${value}`;
            };

            // 获取反面显示文本 (带label前缀)
            const getBackDisplay = (cfg) => {
                let val = backForm[cfg.field];
                if (!val) val = '';
                return `${cfg.label}  ${val}`;
            };

            // 绘制核心 (根据previewSide)
            const drawCertificate = async () => {
                if (!ctx || !canvas) return;
                const w = canvas.width, h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                // 背景逻辑 (共用)
                const useBg = (bgImageObj && bgImageObj.complete && hasCustomBg.value);
                if (useBg) { try { ctx.drawImage(bgImageObj, 0, 0, w, h); } catch(e) { fallbackBg(); } }
                else { fallbackBg(); }
                function fallbackBg() { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); }

                // 金色边框装饰 (双面通用)
                ctx.save();
                ctx.strokeStyle = '#D4AF37';
                ctx.lineWidth = 12;
                ctx.strokeRect(18, 18, w - 36, h - 36);
                ctx.strokeStyle = '#BD9A4A';
                ctx.lineWidth = 3;
                ctx.strokeRect(30, 30, w - 60, h - 60);

                if (previewSide.value === 'front') {
                    // 正面标题
                    ctx.font = 'bold 70px "宋体", "SimHei", serif';
                    ctx.fillStyle = '#C5A028';
                    ctx.textAlign = 'center';
                    ctx.fillText('艺术考级证书', w/2, 110);
                    ctx.font = '28px "宋体"';
                    ctx.fillStyle = '#8b7545';
                    ctx.fillText('CERTIFICATE OF ART EXAMINATION', w/2, 168);
                    ctx.beginPath(); ctx.moveTo(180,200); ctx.lineTo(w-180,200); ctx.strokeStyle='#D4AF37'; ctx.lineWidth=2.5; ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(280,222); ctx.lineTo(w-280,222); ctx.stroke();

                    ctx.font = '46px "宋体", "SimSun", serif';
                    ctx.fillStyle = '#2c2820';
                    ctx.textAlign = 'left';
                    for (let cfg of frontCoords) {
                        let txt = getFrontDisplay(cfg);
                        if (txt && txt !== ': ') ctx.fillText(txt, cfg.x, cfg.y);
                    }
                    // 照片绘制
                    if (form.photo) {
                        const img = new Image();
                        await new Promise((res) => {
                            img.onload = () => {
                                try {
                                    ctx.save();
                                    const px=form.photoX, py=form.photoY, pw=form.photoWidth, ph=form.photoHeight;
                                    ctx.beginPath();
                                    ctx.moveTo(px+18, py); ctx.lineTo(px+pw-18, py);
                                    ctx.quadraticCurveTo(px+pw, py, px+pw, py+18);
                                    ctx.lineTo(px+pw, py+ph-18); ctx.quadraticCurveTo(px+pw, py+ph, px+pw-18, py+ph);
                                    ctx.lineTo(px+18, py+ph); ctx.quadraticCurveTo(px, py+ph, px, py+ph-18);
                                    ctx.lineTo(px, py+18); ctx.quadraticCurveTo(px, py, px+18, py);
                                    ctx.closePath(); ctx.clip();
                                    ctx.drawImage(img, px, py, pw, ph);
                                    ctx.restore();
                                    ctx.strokeStyle="#D4AF37"; ctx.lineWidth=3.5;
                                    ctx.beginPath(); ctx.moveTo(px+18, py); ctx.lineTo(px+pw-18, py); ctx.quadraticCurveTo(px+pw, py, px+pw, py+18);
                                    ctx.lineTo(px+pw, py+ph-18); ctx.quadraticCurveTo(px+pw, py+ph, px+pw-18, py+ph);
                                    ctx.lineTo(px+18, py+ph); ctx.quadraticCurveTo(px, py+ph, px, py+ph-18);
                                    ctx.lineTo(px, py+18); ctx.quadraticCurveTo(px, py, px+18, py);
                                    ctx.stroke();
                                } catch(e){}
                                res();
                            };
                            img.onerror = () => res();
                            img.src = form.photo;
                        });
                    }
                }
                else {  // 反面绘制 (评定表)
                    ctx.font = 'bold 60px "宋体", "SimHei"';
                    ctx.fillStyle = '#B87C2E';
                    ctx.textAlign = 'center';
                    ctx.fillText('艺术考级评定表 (背面)', w/2, 100);
                    ctx.font = 'bolder 60px "宋体"';
                    ctx.fillStyle = '#a67c3a';
                    ctx.fillText('EVALUATION REPORT', w/2, 158);
                    ctx.beginPath(); ctx.moveTo(200,185); ctx.lineTo(w-200,185); ctx.strokeStyle='#dbb452'; ctx.lineWidth=2; ctx.stroke();

                    ctx.font = 'bolder 60px "宋体", "SimSun", serif';
                    ctx.fillStyle = '#2d2a1f';
                    ctx.textAlign = 'left';
                    for (let cfg of backCoords) {
                        let txt = getBackDisplay(cfg);
                        if (txt && txt !== ' ') ctx.fillText(txt, cfg.x, cfg.y);
                    }
                }
                ctx.restore();
            };

            const refreshPreview = () => { drawCertificate(); };

            // 重置坐标（正反面都恢复到默认）
            const resetDefaultCoords = () => {
                const defaultFront = {
                    name:[1370,1250], namePy:[1370,1337], sex:[1370,1424], sexPy:[1370,1511],
                    nationality:[1370,1590], nationalityPy:[1370,1685], nation:[1370,1772], nationPy:[1370,1859],
                    birthday:[1370,1946], birthdayPy:[1370,2033], certificateTime:[1370,2120], certificateTimePy:[1370,2207],
                    maxLevel:[1370,2295], maxLevelPy:[1370,2385], subjectName:[490,1830], subjectNamePy:[490,1915],
                    level:[490,2000], levelPy:[490,2088], result:[490,2180], resultPy:[490,2265],
                    certificate:[490,2350], certificatePy:[490,2435]
                };
                frontCoords.forEach(c => { if(defaultFront[c.key]) { c.x = defaultFront[c.key][0]; c.y = defaultFront[c.key][1]; } });
                form.photoX = 580; form.photoY = 1220;
                const defaultBack = { backName:[720,1400], backSubjectName:[720,1560], backCertificate:[720,1720], result1:[720,1860], result2:[720,2020], result3:[720,2180], result4:[720,2345], backResult:[720,2510] };
                backCoords.forEach(c => { if(defaultBack[c.key]) { c.x = defaultBack[c.key][0]; c.y = defaultBack[c.key][1]; } });
                refreshPreview();
            };

            // 背景上传清除逻辑
            const handleBackgroundUpload = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        backgroundPreview.value = ev.target.result;
                        const img = new Image();
                        img.onload = () => { bgImageObj = img; hasCustomBg.value = true; refreshPreview(); };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            const clearBackground = () => { bgImageObj = null; hasCustomBg.value = false; backgroundPreview.value = ''; refreshPreview(); };
            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if(file) { const reader = new FileReader(); reader.onload = (ev) => { form.photo = ev.target.result; refreshPreview(); }; reader.readAsDataURL(file); }
            };
            const downloadCurrentSide = () => { if(canvas) downloadImage(previewSide.value); };
            const downloadSide = (side) => {
                previewSide.value = side;
                setTimeout(() => { downloadImage(side); }, 50);
            };
            const downloadImage = (sideName) => {
                const link = document.createElement('a');
                link.download = `certificate_${sideName}_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            const generateFromBackend = async () => { apiResponse.value = { info: "双面系统已就绪，可直接下载证书" }; refreshPreview(); alert("已刷新预览"); };

            onMounted(() => {
                canvas = document.getElementById('certificateCanvas');
                ctx = canvas.getContext('2d');
                drawCertificate();
                // 监听所有相关变化自动刷新
                const watchFields = [...Object.keys(form), ...Object.keys(backForm)];
                watch(() => [form, backForm, frontCoords, backCoords, previewSide], () => { nextTick(() => drawCertificate()); }, { deep: true });
                watch(previewSide, () => drawCertificate());
            });

            return {
                activeTab, editSide, previewSide, form, backForm, frontCoords, backCoords,
                backgroundPreview, apiResponse,
                refreshPreview, resetDefaultCoords, handleBackgroundUpload, clearBackground,
                handlePhotoUpload, downloadCurrentSide, downloadSide, generateFromBackend
            };
        }
    }).mount('#app');
</script>
</body>
</html>
